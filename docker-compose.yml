services:
  pos.api:
    image: ${DOCKER_REGISTRY-}webapi
    container_name: POS.Api
    build:
      context: .
      dockerfile: src/POS.Api/Dockerfile
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
    ports:
      - 5000:5000
      - 5001:5001

  postgres:
    image: postgres:latest
    container_name: POS.Db
    environment:
      - POSTGRES_DB=pos
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - 5432:5432

  seq:
    image: datalust/seq:latest
    container_name: POS.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin123
    ports:
      - 5341:5341
      - 8081:80

  redis:
    image: redis:latest
    container_name: POS.Redis
    restart: always
    ports:
      - '6379:6379'

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest
    container_name: POS.AspireDashboard
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    ports:
     - 18888:18888

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: POS.Azurite
    restart: always
    ports:
      - "10000:10000" # Blob storage
      - "10001:10001" # Queue storage
      - "10002:10002" # Table storage
    volumes:
      - azurite_data:/data

volumes:
  postgres_data:
  azurite_data: